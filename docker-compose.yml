services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: opticsops-clickhouse-local
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: opticsops
      CLICKHOUSE_USER: opticsops_ingest
      CLICKHOUSE_PASSWORD: Opt1cs0ps_CH_2026!
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse_data:
